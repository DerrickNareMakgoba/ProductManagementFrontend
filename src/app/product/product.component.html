
<div class="search-container">
    <input
        type="text"
        placeholder="Search products..."
        (input)="onSearch($event)"
    />
</div>

<div class="product-grid">


  <div class="product-card" *ngFor="let product of (this.productStore.products$ | async)?.items">

    <h3>{{ product.name }}</h3>

    <p>{{ product.description }}</p>

    <div class="price">
      R{{ product.price }}
    </div>

    <div class="meta">
      <small>SKU: {{ product.sku || 'N/A' }}</small>
      <small>Qty: {{ product.quantity }}</small>
    </div>

    <div class="button-row">
        <button class="btn view-btn">View</button>
        <button class="btn delete-btn" style="background-color: red;">Delete</button>
    </div>

  </div>
</div>
